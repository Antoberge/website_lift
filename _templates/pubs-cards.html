<script type="text/html" id="quarto-listing-template">
<div class="quarto-grid-item card h-100 shadow-sm">

  {{#image}}
  <div class="thumbnail">
    <img src="{{image}}" alt="" loading="lazy">
  </div>
  {{/image}}

  <div class="card-body d-flex flex-column">
    <!-- Rangée meta : PDF (gauche) + date (droite) -->
    <div class="card-meta-row d-flex justify-content-between align-items-center mb-2">
      {{#pdf}}
      <a class="btn btn-sm btn-pdf stretched-link-fix" href="{{pdf}}" download>PDF</a>
      {{/pdf}}
      {{#date}}<span class="text-muted small ms-auto">{{date}}</span>{{/date}}
    </div>

    <h5 class="card-title listing-title">{{title}}</h5>

    {{#categories.length}}
    <div class="listing-categories mt-2">
      {{#categories}}
        <span class="badge bg-light text-dark border">{{.}}</span>
      {{/categories}}
    </div>
    {{/categories.length}}
  </div>

  <a class="stretched-link" href="{{path}}" aria-label="{{title}}"></a>
</div>
</script>
